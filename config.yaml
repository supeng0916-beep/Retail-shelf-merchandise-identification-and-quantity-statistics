model:
  weights_path: models/yolo_shelf.pt
  engine_path: models/yolo_shelf.engine
  use_tensorrt: false
  conf_threshold: 0.05
  iou_threshold: 0.35
  min_box_area_ratio: 0.001
  device: cuda:0
  warmup_iterations: 3
embedder:
  model_name: models/clip-vit-base-patch32-local
  embedding_dim: 512
  batch_size: 32
  device: cuda:0
matcher:
  index_path: index/faiss_clip.index
  db_path: sku_runtime.db
  sku_images_dir: database/sku_images
  vote_top_k: 5
  min_score_margin: 0.02
  min_vote_count: 3
  min_combined_score: 0.3
  clip_weight: 0.7
  ocr_weight: 0.3
ocr:
  enabled: true
  languages:
    - en
  gpu: false
  sku_csv: my_sku_full.csv
  model_storage_dir: models/easyocr
  download_enabled: true
  clip_gate_low: 0.25
  clip_gate_high: 0.70
preprocessing:
  max_image_dimension: 1920
  auto_enhance_lighting: false
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8
api:
  host: 0.0.0.0
  port: 8000
  max_image_size_mb: 10
  cors_origins:
  - '*'
  return_annotated_image: true
  jpeg_quality: 85
